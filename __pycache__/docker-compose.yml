services:

  db:
    image: postgres:16-alpine
    container_name: exam_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: examuser
      POSTGRES_PASSWORD: exampass
      POSTGRES_DB: exam_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U examuser -d exam_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: exam_app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://examuser:exampass@db:5432/exam_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
